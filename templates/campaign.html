{% extends "layout.html" %}
{% block content %}
    <article class="content-section py-3 px-4 mb-4">
      <div class="d-flex align-items-start gap-4">
        <img class="rounded-circle article-img flex-shrink-0"
             src="/static/profile_pics/default.jpg"
             alt="{{ campaign.author }}'s profile picture"
             width="64"
             height="64"
             loading="lazy">
        <div class="flex-grow-1">
          <div class="article-metadata mb-2">
            <a class="me-2" href="#">{{ campaign.author }}</a>
            <small class="text-body-secondary">{{ campaign.created_at }}</small>
          </div>
          <h2>
            <a class="article-title" 
            href="{{ url_for('campaign', campaign_id=campaign['campaign_id']) }}">{{ campaign.name }}</a>
          </h2>
          <p class="article-content">{{ campaign.campaign_details }}</p>
        </div>
      </div>
    </article>
{% endblock content %}
